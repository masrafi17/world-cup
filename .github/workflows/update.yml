name: FIFA Auto Update

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync upstream
        uses: tgymnich/fork-sync@v1.8
        with:
          owner: srhady
          repo: fifaplus
          token: ${{ secrets.GITHUB_TOKEN }}
          head: main
          base: main